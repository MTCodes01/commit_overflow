<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Commit Overflow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem;
            margin: 3rem 0;
            min-height: 300px;
        }
        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 135px;
        }
        .podium-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--bg-tertiary);
            border: 3px solid var(--border-color);
            margin-bottom: -32px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-secondary);
        }
        .podium-bar {
            width: 100%;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
            text-align: center;
        }
        .podium-bar > div {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .podium-bar.first { height: 220px; border-color: #d29922; background: linear-gradient(180deg, rgba(210,153,34,0.2) 0%, var(--bg-secondary) 100%); }
        .podium-bar.second { height: 180px; border-color: #8b949e; background: linear-gradient(180deg, rgba(139,148,158,0.2) 0%, var(--bg-secondary) 100%); }
        .podium-bar.third { height: 140px; border-color: #a371f7; background: linear-gradient(180deg, rgba(163,113,247,0.2) 0%, var(--bg-secondary) 100%); }
        
        @media (max-width: 480px) {
            .podium-container {
                gap: 0.5rem;
                min-height: 240px;
                margin: 1.5rem 0;
            }
            .podium-place {
                width: 100px;
            }
            .podium-avatar {
                width: 48px;
                height: 48px;
                margin-bottom: -24px;
                font-size: 1.5rem;
            }
            .podium-place:nth-child(2) .podium-avatar {
                width: 60px;
                height: 60px;
                margin-bottom: -30px;
            }
            .podium-bar.first { height: 170px; }
            .podium-bar.second { height: 145px; }
            .podium-bar.third { height: 120px; }
            .podium-bar {
                padding-top: 30px;
                font-size: 0.875rem;
            }
            .podium-bar .text-sm {
                font-size: 0.75rem !important;
            }
        }
        
        .controls-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
        }
        .search-wrapper {
            flex-grow: 1;
            max-width: 400px;
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .search-wrapper input {
            padding-left: 2rem;
        }
    </style>
</head>
<body>
    
    <div class="app-wrapper">
        <!-- Sidebar injected here -->
        
        <main class="main-content">
            <div class="page-header">
                <h1>Leaderboard</h1>
                <p class="text-secondary mt-1">See how you stack up against other developers.</p>
            </div>

            <div class="podium-container" id="podium-container">
                <div class="text-secondary text-center py-4 w-full">Loading podium places...</div>
            </div>

            <div class="card glass-card">
                <div class="controls-bar">
                    <div class="search-wrapper">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" class="form-control" id="search-input" placeholder="Search user...">
                    </div>
                    <div class="flex gap-2">
                        <select id="sort-select" class="form-control" style="width: auto;">
                            <option value="highest">Sort: Score (Highest)</option>
                            <option value="lowest">Sort: Score (Lowest)</option>
                        </select>
                        <select id="college-select" class="form-control" style="width: auto;">
                            <option value="all">Filter: All Colleges</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>User</th>
                                <th>College</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <tr>
                                <td colspan="4" class="text-center text-secondary py-3">Loading leaderboard...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            Components.renderSidebar('leaderboard');
            
            try {
                const leaderboard = await API.fetchLeaderboard('all');
                
                // 1. Populate the top 3 podium places
                const podiumContainer = document.getElementById('podium-container');
                if (podiumContainer) {
                    const first = leaderboard[0];
                    const second = leaderboard[1];
                    const third = leaderboard[2];
                    
                    podiumContainer.innerHTML = `
                        <!-- Second Place -->
                        <div class="podium-place">
                            <div class="podium-avatar" style="border-color: #8b949e; overflow: hidden;">
                                ${second && second.avatar_url ? `<img src="${second.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-user"></i>'}
                            </div>
                            <div class="podium-bar second">
                                <div>2</div>
                                <div class="text-sm font-normal text-secondary mt-1">${second ? second.github_username : '---'}</div>
                                <div class="text-primary text-sm mt-1">${second ? second.total_points : 0} pts</div>
                            </div>
                        </div>
                        <!-- First Place -->
                        <div class="podium-place">
                            <div class="podium-avatar" style="border-color: #d29922; width: 80px; height: 80px; margin-bottom: -40px; overflow: hidden;">
                                ${first && first.avatar_url ? `<img src="${first.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-crown" style="color: #d29922;"></i>'}
                            </div>
                            <div class="podium-bar first">
                                <div style="font-size: 1.5rem;">1</div>
                                <div class="text-sm font-normal text-secondary mt-1">${first ? first.github_username : '---'}</div>
                                <div class="text-primary text-sm mt-1">${first ? first.total_points : 0} pts</div>
                            </div>
                        </div>
                        <!-- Third Place -->
                        <div class="podium-place">
                            <div class="podium-avatar" style="border-color: #a371f7; overflow: hidden;">
                                ${third && third.avatar_url ? `<img src="${third.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-user"></i>'}
                            </div>
                            <div class="podium-bar third">
                                <div>3</div>
                                <div class="text-sm font-normal text-secondary mt-1">${third ? third.github_username : '---'}</div>
                                <div class="text-primary text-sm mt-1">${third ? third.total_points : 0} pts</div>
                            </div>
                        </div>
                    `;
                }

                // 2. Populate college filter dropdown
                const collegeSelect = document.getElementById('college-select');
                if (collegeSelect) {
                    const colleges = [...new Set(leaderboard.map(e => e.college).filter(Boolean))];
                    colleges.forEach(col => {
                        const opt = document.createElement('option');
                        opt.value = col.toLowerCase();
                        opt.textContent = col;
                        collegeSelect.appendChild(opt);
                    });
                }
                
                // 3. Render leaderboard body rows
                const tbody = document.getElementById('leaderboard-body');
                const renderTable = (data) => {
                    if (!tbody) return;
                    tbody.innerHTML = '';
                    
                    if (data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-secondary py-3">No participants found.</td></tr>`;
                        return;
                    }
                    
                    data.forEach(entry => {
                        let rankEmoji = entry.rank;
                        if (entry.rank === 1) rankEmoji = '🥇 1';
                        else if (entry.rank === 2) rankEmoji = '🥈 2';
                        else if (entry.rank === 3) rankEmoji = '🥉 3';
                        
                        const tr = document.createElement('tr');
                        tr.dataset.college = (entry.college || '').toLowerCase();
                        tr.innerHTML = `
                            <td><strong>${rankEmoji}</strong></td>
                            <td class="flex items-center gap-2">
                                <div style="width:24px;height:24px;background:var(--bg-tertiary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden;">
                                    ${entry.avatar_url ? `<img src="${entry.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />` : '<i class="ph ph-user"></i>'}
                                </div>
                                ${entry.github_username}
                            </td>
                            <td>${entry.college || '---'}</td>
                            <td class="text-primary font-bold">${entry.total_points}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                };
                
                renderTable(leaderboard);
                
                // Setup search, sort, and college filter controls
                const searchInput = document.getElementById('search-input');
                const sortSelect = document.getElementById('sort-select');
                
                const filterAndSort = () => {
                    const query = searchInput.value.toLowerCase();
                    const sortVal = sortSelect.value;
                    const collegeVal = collegeSelect.value;
                    
                    let filtered = leaderboard.filter(entry => {
                        const nameMatch = entry.github_username.toLowerCase().includes(query) || 
                                          entry.name.toLowerCase().includes(query);
                        const collegeMatch = collegeVal === 'all' || 
                                            (entry.college || '').toLowerCase() === collegeVal;
                        return nameMatch && collegeMatch;
                    });
                    
                    filtered.sort((a, b) => {
                        if (sortVal === 'highest') {
                            return b.total_points - a.total_points;
                        } else if (sortVal === 'lowest') {
                            return a.total_points - b.total_points;
                        }
                        return 0;
                    });
                    
                    renderTable(filtered);
                };
                
                searchInput.addEventListener('input', filterAndSort);
                sortSelect.addEventListener('change', filterAndSort);
                collegeSelect.addEventListener('change', filterAndSort);

            } catch (err) {
                console.error("Error fetching leaderboard", err);
                Components.showToast("Failed to load leaderboard data.", "error");
            }
        });
    </script>
</body>
</html>
